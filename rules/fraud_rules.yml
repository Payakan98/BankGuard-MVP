rules:
  - name: HIGH_AMOUNT
    condition: "amount > 10000"

  - name: HIGH_AMOUNT_HIGH_RISK_COUNTRY
    condition: "amount > 5000 and country_risk == 1"

  - name: VELOCITY_SPIKE_1H
    condition: "velocity_1h_count > 10"

  - name: VELOCITY_SPIKE_6H
    condition: "velocity_6h_count > 20"

  - name: HIGH_MERCHANT_RISK
    condition: "merchant_risk_score > 0.5"

  - name: ANOMALOUS_HOUR
    condition: "hour_sin < -0.9"
